<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>EdgeForge</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0f172a;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:20px;

}

.container{

width:500px;

background:white;

padding:35px;

border-radius:15px;

box-shadow:0 15px 35px rgba(0,0,0,.3);

}

h1{

color:#2563eb;

margin-bottom:10px;

}

p{

color:#555;

margin-bottom:25px;

}

input[type=file]{

width:100%;

padding:12px;

border:2px dashed #2563eb;

border-radius:10px;

margin-bottom:20px;

}

button{

width:100%;

padding:14px;

background:#2563eb;

color:white;

border:none;

border-radius:10px;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

.error{

background:#fee2e2;

border:1px solid #ef4444;

color:#991b1b;

padding:15px;

border-radius:10px;

margin-bottom:20px;

}

.success{

background:#dcfce7;

border:1px solid #22c55e;

color:#166534;

padding:15px;

border-radius:10px;

margin-bottom:20px;

}

</style>

</head>

<body>

<div class="container">

<h1>🛡 EdgeForge</h1>

<p>AI Software Verification Platform</p>

{% if error %}

<div class="error">

<strong>Error</strong>

<br><br>

{{ error }}

</div>

{% endif %}

<form
action="/analyze"
method="POST"
enctype="multipart/form-data">

<input
type="file"
name="file"
accept=".py"
required>

<button type="submit">

Analyze Python File

</button>

</form>

</div>

</body>

</html>
