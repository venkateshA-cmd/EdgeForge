
<!DOCTYPE html>

<html>

<head>

<title>EdgeForge Report</title>

<style>

body {

font-family: Arial;

margin:40px;

background:#f5f5f5;

}

.card {

background:white;

padding:20px;

margin-bottom:20px;

border-radius:8px;

box-shadow:0px 0px 8px rgba(0,0,0,.1);

}

table {

width:100%;

border-collapse:collapse;

}

th,td {

border:1px solid #ddd;

padding:10px;

}

th {

background:#333;

color:white;

}

</style>

</head>

<body>

<h1>EdgeForge Analysis Report</h1>

<div class="card">

<h2>Summary</h2>

<p><b>Functions:</b> 0</p>

<p><b>Classes:</b> 0</p>

<p><b>Findings:</b> 0</p>

<p><b>Generated Tests:</b> 0</p>

</div>

<div class="card">

<h2>Findings</h2>

<table>

<tr>

<th>Severity</th>

<th>Function</th>

<th>Issue</th>

</tr>


</table>

</div>

<div class="card">

<h2>Generated Test Cases</h2>

<table>

<tr>

<th>Function</th>

<th>Inputs</th>

<th>Reason</th>

</tr>



</table>

</div>

</body>

</html>
